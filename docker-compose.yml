services:
  db:
    image: mysql:8.0
    container_name: cook-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-root}
      MYSQL_DATABASE: ${DB_DATABASE:-cook}
      MYSQL_USER: ${DB_USER:-cook}
      MYSQL_PASSWORD: ${DB_PASSWORD:-root}
    ports:
      - "${DOCKER_DB_PORT:-3308}:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-p${DB_PASSWORD:-root}"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cook-app
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: ${PORT:-3000}
      DB_CLIENT: ${DB_CLIENT:-mysql2}
      DB_HOST: db
      DB_PORT: 3306
      DB_USER: ${DB_USER:-cook}
      DB_PASSWORD: ${DB_PASSWORD:-root}
      DB_DATABASE: ${DB_DATABASE:-cook}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${PORT:-3000}:3000"
    command: >
      sh -c "npx knex migrate:latest &&
             npx knex seed:run &&
             node dist/index.js"

volumes:
  db_data:
